<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIERO_RODRIGUEZ_2026 - Granola</title>
  <meta name="description" content="Piero Rodriguez - product design, AI systems, London.">
  <style>
    :root {
      --bg: #f8f8f7;
      --surface: #ffffff;
      --surface-soft: #f1efeb;
      --chrome: #efeeec;
      --chrome-border: #d8d6d2;
      --ink: #191816;
      --ink-muted: #6a665f;
      --ink-faint: #9a9690;
      --border: #dad7d1;
      --border-light: #e9e6df;
      --accent: #c8611a;
      --accent-soft: #f7ece2;
      --green: #2f8c56;
      --shadow: rgba(30, 28, 24, 0.12);
      --mono: ui-monospace, "SF Mono", "Fira Code", "Cascadia Code", "Menlo", "Consolas", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      transition: background 0.28s ease, color 0.28s ease;
    }

    body.video-playing {
      --bg: #11100e;
      --surface: #191714;
      --surface-soft: #24211d;
      --chrome: #1f1d19;
      --chrome-border: #3a352e;
      --ink: #f5f0e8;
      --ink-muted: #b9afa3;
      --ink-faint: #83786c;
      --border: #3d372f;
      --border-light: #2f2a25;
      --accent-soft: #2b2018;
      --shadow: rgba(0, 0, 0, 0.28);
    }

    body.modal-open {
      overflow: hidden;
    }

    a,
    button {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 0;
    }

    .disk-window {
      width: 100%;
      background: transparent;
      transition: background 0.28s ease;
    }

    .chrome-bar {
      min-height: 44px;
      padding: 0 max(18px, calc((100vw - 980px) / 2));
      background: var(--chrome);
      border-bottom: 1px solid var(--chrome-border);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.28s ease, border-color 0.28s ease;
    }

    .traffic-lights {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .tl {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 0.5px solid rgba(0, 0, 0, 0.14);
    }

    .tl-red { background: #ff5f57; }
    .tl-yellow { background: #febc2e; }
    .tl-green { background: #28c840; }

    .disk-path {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-muted);
      letter-spacing: 0.03em;
    }

    .disk-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .content {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding-bottom: 6px;
    }

    .title-row {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-family: var(--mono);
      font-size: clamp(34px, 6vw, 64px);
      line-height: 0.95;
      letter-spacing: 0.01em;
      font-weight: 650;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 140, 86, 0.12);
      flex: 0 0 auto;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }

    .module-card {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
      color: var(--ink);
      transition: background 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    }

    .card-header {
      padding: 14px 16px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: background 0.28s ease, border-color 0.28s ease;
    }

    .card-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .file-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
      white-space: nowrap;
    }

    .video-wrap {
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    video {
      width: min(100%, 420px);
      aspect-ratio: 9 / 16;
      display: block;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 7px;
      object-fit: cover;
    }

    .link-card,
    .action-card {
      width: 100%;
      min-height: 0;
      padding: 16px;
      border: 0;
      background: transparent;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .link-card:hover,
    .action-card:hover {
      background: var(--accent-soft);
      transform: none;
    }

    .card-title {
      margin: 0;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: 0.03em;
      font-weight: 650;
    }

    .card-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: block;
      padding: 0;
      background: rgba(22, 20, 18, 0.82);
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .letter-modal {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
    }

    .letter-modal iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #4a4946;
    }

    .modal-close {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 2;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(245, 240, 232, 0.42);
      border-radius: 50%;
      background: rgba(26, 20, 16, 0.74);
      color: #f5f0e8;
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    .modal-close:hover {
      background: rgba(26, 20, 16, 0.92);
    }

    @media (max-width: 760px) {
      .page {
        padding: 0;
      }

      .content {
        width: min(100% - 24px, 980px);
        padding: 24px 0;
      }

    }

    @media (max-width: 460px) {
      .content {
        padding: 22px 0;
      }

      .chrome-bar {
        padding: 0 12px;
      }

      .disk-path {
        font-size: 10px;
      }

      .card-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .link-card,
      .action-card {
        align-items: flex-start;
        flex-direction: column;
        gap: 14px;
      }

      .modal-backdrop {
        padding: 0;
      }

      .letter-modal {
        height: 100vh;
        height: 100dvh;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="disk-window" aria-label="Piero Rodriguez application contents">
      <div class="chrome-bar" aria-hidden="true">
        <div class="traffic-lights">
          <span class="tl tl-red"></span>
          <span class="tl tl-yellow"></span>
          <span class="tl tl-green"></span>
        </div>
        <div class="disk-path">
          <svg class="disk-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1.5" y="1.5" width="15" height="15" rx="1.5" fill="#4a4845" stroke="#2a2825" stroke-width="0.75"/>
            <rect x="3.5" y="1.5" width="8" height="6" rx="0.5" fill="#c8c4be"/>
            <rect x="8.5" y="2" width="2" height="5" rx="0.25" fill="#7a7772"/>
            <rect x="3" y="9.5" width="12" height="6" rx="0.5" fill="#d8d4ce"/>
            <rect x="5" y="11" width="8" height="3" rx="0.25" fill="#b8b4ae"/>
          </svg>
          <span>/GRANOLA/APPLICATION_DISK</span>
        </div>
      </div>

      <div class="content">
        <header class="header">
          <div class="title-row">
            <h1>PIERO RODRIGUEZ_2026</h1>
          </div>
          <div class="status-line">
            <span class="status-dot" aria-hidden="true"></span>
            <span>disk status: surprisingly functional</span>
          </div>
        </header>

        <div class="stack">
          <section class="module-card" aria-label="Introduction video">
            <div class="card-header">
              <span class="card-label">00_INTRO_VIDEO.MOV</span>
              <span class="file-meta">2026-06-04 / video</span>
            </div>
            <div class="video-wrap">
              <video controls preload="metadata" src="https://res.cloudinary.com/ds0soojq2/video/upload/v1780589702/My_weird_presentation_to_granola_qxp9lo.mov">
                Your browser does not support the video tag.
              </video>
            </div>
          </section>

          <section class="module-card">
            <div class="card-header">
              <span class="card-label">01_COVER_LETTER.TXT</span>
              <span class="file-meta">2026-06-04 / text</span>
            </div>
            <button class="action-card" type="button" data-letter-open>
              <span>
                <p class="card-title">Cover letter</p>
              </span>
              <span class="card-tag">Open letter</span>
            </button>
          </section>

          <section class="module-card">
            <div class="card-header">
              <span class="card-label">02_CV.URL</span>
              <span class="file-meta">2026-06-04 / link</span>
            </div>
            <a class="link-card is-url" href="https://drive.google.com/file/d/1O4o4tQgn4eowk-fynAqQDiuwqANW-iB1/view?usp=sharing" target="_blank" rel="noopener noreferrer" aria-label="Open CV in new tab">
              <span>
                <p class="card-title">CV</p>
              </span>
              <span class="card-tag">Open CV</span>
            </a>
          </section>

          <section class="module-card">
            <div class="card-header">
              <span class="card-label">03_PORTFOLIO.URL</span>
              <span class="file-meta">2026-06-04 / link</span>
            </div>
            <a class="link-card is-url" href="https://pierorodriguez.framer.website/" target="_blank" rel="noopener noreferrer" aria-label="Open portfolio in new tab">
              <span>
                <p class="card-title">Portfolio</p>
              </span>
              <span class="card-tag">Open portfolio</span>
            </a>
          </section>
        </div>
      </div>

    </section>
  </main>

  <div class="modal-backdrop" id="letterModal" aria-hidden="true">
    <div class="letter-modal" role="dialog" aria-modal="true" aria-label="Cover letter">
      <button class="modal-close" type="button" aria-label="Close cover letter" data-letter-close>&times;</button>
      <iframe src="cover-letter/index.html" title="Cover letter" allowtransparency="true"></iframe>
    </div>
  </div>

  <script>
    const letterModal = document.getElementById('letterModal');
    const openLetterLinks = document.querySelectorAll('[data-letter-open]');
    const closeLetterButtons = document.querySelectorAll('[data-letter-close]');
    const introVideo = document.querySelector('video');

    function setVideoTheme(isPlaying) {
      document.body.classList.toggle('video-playing', isPlaying);
    }

    function openLetter(event) {
      event.preventDefault();
      letterModal.classList.add('is-open');
      letterModal.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
    }

    function closeLetter() {
      letterModal.classList.remove('is-open');
      letterModal.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
    }

    openLetterLinks.forEach((link) => {
      link.addEventListener('click', openLetter);
    });

    closeLetterButtons.forEach((button) => {
      button.addEventListener('click', closeLetter);
    });

    introVideo.addEventListener('play', () => {
      setVideoTheme(true);
    });

    introVideo.addEventListener('pause', () => {
      setVideoTheme(false);
    });

    introVideo.addEventListener('ended', () => {
      setVideoTheme(false);
    });

    letterModal.addEventListener('click', (event) => {
      if (event.target === letterModal) {
        closeLetter();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && letterModal.classList.contains('is-open')) {
        closeLetter();
      }
    });
  </script>
</body>
</html>
